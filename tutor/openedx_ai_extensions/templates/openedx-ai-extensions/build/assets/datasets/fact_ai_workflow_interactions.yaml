description: >
  Fact table for AI workflow interactions from the openedx-ai-extensions plugin.
  Tracks when learners initialize, interact with, or complete AI-powered
  educational workflows. Filters xapi_events_all_parsed to only include
  events with the ai-workflow activity type.
